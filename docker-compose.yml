version: "3.9"

# ═══════════════════════════════════════════════════════════
# CREST — Full Local Dev Stack
# Services: postgres+pgvector · redis · kafka+zookeeper
#           elasticsearch · fastapi · celery (3 queues)
#           nextjs dashboard
# ═══════════════════════════════════════════════════════════

x-common-env: &common-env
  CREST_DB_URL:         postgresql://crest_user:crest_pass@postgres:5432/crest_db
  REDIS_URL:            redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  GROQ_API_KEY:         ${GROQ_API_KEY:-}
  GROQ_BASE_URL:        ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
  GROQ_CLASSIFIER_MODEL: ${GROQ_CLASSIFIER_MODEL:-openai/gpt-oss-20b}
  GROQ_DRAFT_MODEL:     ${GROQ_DRAFT_MODEL:-llama-3.3-70b-versatile}
  OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
  EMBEDDING_MODE:       ${EMBEDDING_MODE:-mock}

services:

  # ── PostgreSQL 16 + pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crest_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       crest_db
      POSTGRES_USER:     crest_user
      POSTGRES_PASSWORD: crest_pass
    ports: ["5432:5432"]
    volumes:
      - crest_pgdata:/var/lib/postgresql/data
      - ./infra/docker/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crest_user -d crest_db"]
      interval: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: crest_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [crest_redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Zookeeper (Kafka dependency) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: crest_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: crest_kafka
    depends_on:
      zookeeper: { condition: service_healthy }
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENERS:                        PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  # ── Kafka topic setup ─────────────────────────────────────
  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka: { condition: service_healthy }
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.email     --partitions 3 --replication-factor 1
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.whatsapp  --partitions 3 --replication-factor 1
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.app       --partitions 3 --replication-factor 1
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.twitter   --partitions 3 --replication-factor 1
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.voice     --partitions 3 --replication-factor 1
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic crest.channel.branch    --partitions 3 --replication-factor 1
       echo 'Kafka topics created'"
    restart: "no"

  # ── Elasticsearch ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: crest_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports: ["9200:9200"]
    volumes: [crest_esdata:/usr/share/elasticsearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      retries: 10

  # ── FastAPI backend ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: crest_api
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports: ["8000:8000"]
    environment:
      <<: *common-env
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes: [.:/app]
    command: uvicorn backend.main:socket_app --host 0.0.0.0 --port 8000 --reload

  # ── Celery ingest worker ──────────────────────────────────
  worker-ingest:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: crest_worker_ingest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      <<: *common-env
    volumes: [.:/app]
    command: celery -A backend.workers.celery_app worker -Q ingest -c 4 --loglevel=info

  # ── Celery scheduler worker (Beat + priority/SLA jobs) ───
  worker-scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: crest_worker_scheduler
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      <<: *common-env
    volumes: [.:/app]
    command: celery -A backend.workers.celery_app worker -Q scheduler -c 2 --loglevel=info

  # ── Celery Beat (job scheduler) ───────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: crest_celery_beat
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    environment:
      <<: *common-env
    volumes: [.:/app]
    command: celery -A backend.workers.celery_app beat --loglevel=info

  # ── Kafka consumer ────────────────────────────────────────
  kafka-consumer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: crest_kafka_consumer
    restart: unless-stopped
    depends_on:
      kafka:  { condition: service_healthy }
      redis:  { condition: service_healthy }
    environment:
      <<: *common-env
    volumes: [.:/app]
    command: python -m integrations.kafka.consumer

  # ── Next.js dashboard ─────────────────────────────────────
  dashboard:
    build:
      context: ./frontend/nextjs-app
      dockerfile: ../../infra/docker/Dockerfile.nextjs
    container_name: crest_dashboard
    restart: unless-stopped
    depends_on: [api]
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      BACKEND_INTERNAL_URL: http://api:8000

volumes:
  crest_pgdata:
  crest_redisdata:
  crest_esdata:

networks:
  default:
    name: crest_network
